name: Extraction Replay

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual trigger for testing or emergency replay.

jobs:
  replay-failed-extractions:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      API_URL: ${{ secrets.PRODUCTION_API_URL }}
      ADMIN_KEY: ${{ secrets.ADMIN_SECRET_KEY }}
    steps:
      - name: Check required secrets
        run: |
          if [ -z "$API_URL" ]; then
            echo "ERROR: PRODUCTION_API_URL secret is not set."
            echo "Add it under: GitHub repo → Settings → Secrets and variables → Actions → Secrets"
            exit 1
          fi
          if [ -z "$ADMIN_KEY" ]; then
            echo "ERROR: ADMIN_SECRET_KEY secret is not set."
            exit 1
          fi

      - name: Trigger extraction replay
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$API_URL/internal/run-extraction-replay" \
            -H "X-ADMIN-KEY: $ADMIN_KEY" \
            -H "Content-Type: application/json" \
            --max-time 300)

          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP status: $HTTP_STATUS"
          echo "Response: $BODY"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Extraction replay failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "Extraction replay completed successfully"
