name: Deploy Health Check

on:
  push:
    branches: [dev, main]

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Set environment URL
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "url=https://pet-circle.onrender.com" >> "$GITHUB_OUTPUT"
            echo "env_name=production" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://pet-circle.onrender.com" >> "$GITHUB_OUTPUT"
            echo "env_name=development" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for deploy and health check
        # Non-blocking: Render free-tier can take 5-10 min to deploy/wake.
        # A failed health check should not block merges — check Render dashboard
        # directly if the service is unhealthy after deploy.
        continue-on-error: true
        run: |
          URL="${{ steps.env.outputs.url }}"
          ENV="${{ steps.env.outputs.env_name }}"
          echo "Checking $ENV at $URL/health"

          # Initial wait for Render to start the deploy.
          sleep 90

          # Retry every 30 s for up to 5 minutes (10 attempts).
          MAX_RETRIES=10
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health" --max-time 30 || echo "000")
            echo "Attempt $i/$MAX_RETRIES — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            [ "$i" -lt "$MAX_RETRIES" ] && sleep 30
          done

          echo "Health check did not pass after $MAX_RETRIES attempts (status $STATUS)."
          echo "Render may still be deploying. Check https://dashboard.render.com for service status."
          exit 1
