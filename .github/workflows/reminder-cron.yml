name: Daily Reminder Engine

on:
  schedule:
    # 2:30 AM UTC = 8:00 AM IST — daily reminder run.
    - cron: '30 2 * * *'
  workflow_dispatch:
    # Allow manual trigger for testing.

jobs:
  run-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      API_URL: ${{ secrets.PRODUCTION_API_URL }}
      ADMIN_KEY: ${{ secrets.ADMIN_SECRET_KEY }}
    steps:
      - name: Check required secrets
        run: |
          if [ -z "$API_URL" ]; then
            echo "ERROR: PRODUCTION_API_URL secret is not set."
            echo "Add it under: GitHub repo → Settings → Secrets and variables → Actions → Secrets"
            exit 1
          fi
          if [ -z "$ADMIN_KEY" ]; then
            echo "ERROR: ADMIN_SECRET_KEY secret is not set."
            exit 1
          fi

      - name: Trigger reminder engine
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$API_URL/internal/run-reminder-engine" \
            -H "X-ADMIN-KEY: $ADMIN_KEY" \
            --max-time 120)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Reminder engine failed with status $STATUS"
            exit 1
          fi
          echo "Reminder engine completed successfully"

      - name: Trigger nudge scheduler
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$API_URL/internal/run-nudge-scheduler" \
            -H "X-ADMIN-KEY: $ADMIN_KEY" \
            --max-time 120)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Nudge scheduler failed with status $STATUS"
            exit 1
          fi
          echo "Nudge scheduler completed successfully"
